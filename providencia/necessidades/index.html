<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Necessidades | Providência - Shalom Brasília</title>
  <meta name="description" content="Necessidades das casas comunitárias e centros de evangelização da Comunidade Shalom Brasília.">

  <!-- Open Graph -->
  <meta property="og:title" content="Necessidades | Providência - Shalom Brasília">
  <meta property="og:description" content="Necessidades das casas comunitárias e centros de evangelização da Comunidade Shalom Brasília.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://brasilia.comshalom.org/providencia/imagens/link.jpg">

  <!-- Header do projeto pai: Bootstrap 5 CSS, Montserrat, Favicons, GA -->
  <script src="../../js/header.js"></script>

  <!-- Cinzel (títulos) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Estilos locais -->
  <link rel="stylesheet" href="../css/style.css">
  <!-- Aplica tema salvo antes do render para evitar flash -->
  <script>(function(){var t=localStorage.getItem('prov-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
</head>

<body>

  <!-- ==================== PRELOADER ==================== -->
  <div id="preloader" class="preloader">
    <div class="spinner"></div>
  </div>

  <!-- ==================== HEADER ==================== -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner header-inner--sub">
        <a href="../" class="header-back" aria-label="Voltar ao início">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <a href="../" class="header-logo-link">
          <img src="../imagens/logo-completa.svg" alt="Providência - Shalom" class="header-logo">
        </a>
        <h1 class="header-title">Providência</h1>
      </div>
    </div>
  </header>

  <!-- ==================== NAVEGAÇÃO ==================== -->
  <nav class="section-nav">
    <div class="container">
      <div class="section-nav-inner">
        <span class="section-btn active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Necessidades
        </span>
        <a href="../habilidades/" class="section-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Habilidades
        </a>
      </div>
    </div>
  </nav>

  <!-- ==================== CONTEÚDO: NECESSIDADES ==================== -->
  <main class="section-content">
    <div class="container">
      <div class="content-card">
        <h2 class="section-title">Necessidades da Comunidade</h2>
        <p class="section-subtitle">Veja o que os centros de evangelização estão precisando e contribua com uma doação.</p>

        <!-- Abas dinâmicas (geradas pelo JS) -->
        <div class="tabs-wrapper">
          <ul class="nav nav-pills" id="needs-tabs" role="tablist">
            <!-- JS insere as abas aqui -->
          </ul>
        </div>

        <!-- Nome completo do local selecionado -->
        <p id="needs-local-name" class="needs-local-name"></p>

        <!-- Estado de carregamento -->
        <div id="needs-loading" class="loading-state">
          <div class="spinner-sm"></div>
          <p>Carregando necessidades...</p>
        </div>
        <!-- Estado de erro -->
        <div id="needs-error" class="error-state" style="display:none;">
          <p>Não foi possível carregar os dados. Tente novamente mais tarde.</p>
        </div>

        <!-- Conteúdo das abas (gerado pelo JS) -->
        <div class="tab-content" id="needs-tab-content">
        </div>
      </div>
    </div>
  </main>

  <!-- ==================== RODAPÉ ==================== -->
  <!-- ==================== SCRIPTS ==================== -->
  <script src="../../js/centralScript.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/necessidades.js"></script>
  <script src="../../js/footer.js"></script>

  <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema claro/escuro">
    <svg class="theme-icon theme-icon--light" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="theme-icon theme-icon--dark" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

</body>

</html>

  <style>
    .ev-top { background: var(--paper-3); border-bottom: 1px solid var(--line); }
    .ev-top__bar { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .ev-back { display:inline-flex; align-items:center; gap:.4rem; color:var(--blue-deep); font-weight:700; padding: 1.05rem 0; }
    .ev-back svg { width:18px; height:18px; }
    .btn--sm { padding:.55rem .9rem; font-size:.85rem; }
    .btn--sm svg { width:17px; height:17px; }
    .ev { padding: clamp(1.5rem,5vh,3rem) 0 clamp(3rem,9vh,6rem); }
    .ev-grid { display:grid; gap: clamp(1.5rem,4vw,3rem); grid-template-columns: 1fr; align-items:start; }
    @media (min-width: 900px){ .ev-grid { grid-template-columns: 0.85fr 1.15fr; } }
    .ev-poster { border-radius: var(--r-xl); overflow:hidden; box-shadow: var(--shadow-lg); border:1px solid var(--line); background: linear-gradient(150deg,var(--blue-deep),var(--blue-ink)); aspect-ratio: 4/5; position: relative; max-width: 420px; margin-inline:auto; width:100%; }
    @media (min-width: 900px){ .ev-poster { position: sticky; top: 86px; } }
    .ev-poster img { width:100%; height:100%; object-fit: contain; }
    .ev-poster .poster-fallback { position:absolute; inset:0; display:grid; place-items:center; text-align:center; padding:2rem; color:#fff; }
    .ev-poster .poster-fallback h4 { font-size: clamp(1.8rem,6vw,2.6rem); }
    .ev-badge { display:inline-block; background:var(--blue-soft); color:var(--blue-deep); font-weight:800; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; padding:.4rem .8rem; border-radius:var(--r-pill); margin-bottom:1rem; }
    .ev h1 { font-size: clamp(2rem,7vw,3.1rem); line-height:1.02; }
    .ev-meta { display:flex; flex-wrap:wrap; gap:.6rem 1.4rem; margin:1.1rem 0 1.5rem; }
    .ev-meta .item { display:flex; align-items:center; gap:.5rem; color:var(--ink-soft); font-weight:600; }
    .ev-meta svg { width:19px; height:19px; color:var(--blue); }
    .ev-desc { color:var(--ink-soft); font-size:1.06rem; }
    .ev-desc p { margin:0 0 1rem; white-space: pre-wrap; }
    .ev-actions { display:flex; flex-wrap:wrap; gap:.7rem; margin-top:1.5rem; }
    .ev-missing { text-align:center; padding: 5rem 0; }
  </style>

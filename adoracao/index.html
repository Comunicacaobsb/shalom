<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script src="../js/header.js"></script>

  <meta property="og:site_name" content="Shalom Brasília">
  <meta property="og:title" content="Adoração Perpétua — Shalom Brasília" />
  <meta property="og:description" content="Veja os horários disponíveis e comprometa-se com a Adoração Perpétua" />
  <meta property="og:type" content="website" />

  <title>Adoração Perpétua — Shalom Brasília</title>

  <style>
    /* ========================================
       CONFIGURAÇÕES — edite aqui
       ======================================== */

    /* ==============================================
       CSS — Mobile First
       ============================================== */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-primary, 'Montserrat', sans-serif);
      background: var(--bg, #f0f0f0);
      color: var(--text, #111);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* — Loading state — */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border, #e5e7eb);
      border-top-color: var(--brand, #204f8c);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* — Header — */
    .page-header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      background: linear-gradient(135deg, var(--brand, #204f8c), var(--brand-dark, #163663));
      color: #fff;
    }
    .page-header h1 {
      font-size: var(--font-size-3, 1.75rem);
      font-weight: 700;
      margin-bottom: .25rem;
      line-height: 1.2;
    }
    .page-header p {
      font-size: var(--font-size-small, .87rem);
      opacity: .85;
      max-width: 480px;
      margin: 0 auto;
    }

    /* — Stats summary — */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: .75rem;
      padding: 1rem;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--bg-card, rgba(255,255,255,.72));
      border: 1px solid var(--border, #e5e7eb);
      border-radius: .75rem;
      padding: .75rem 1rem;
      text-align: center;
      flex: 1;
      min-width: 0;
      max-width: 200px;
      box-shadow: var(--box-shadow-1, 0 2px 8px rgba(0,0,0,.1));
    }
    .stat-card .stat-value {
      font-size: var(--font-size-4, 1.52rem);
      font-weight: 700;
      color: var(--brand, #204f8c);
    }
    .stat-card .stat-label {
      font-size: var(--font-size-minor, .76rem);
      color: var(--text-muted, #777);
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    /* — Day selector (mobile tabs) — */
    .day-selector {
      display: flex;
      overflow-x: auto;
      gap: .5rem;
      padding: .5rem 1rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .day-selector::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
      padding: .5rem .75rem;
      border-radius: .75rem;
      border: 1px solid var(--border, #e5e7eb);
      background: var(--bg-card, rgba(255,255,255,.72));
      cursor: pointer;
      transition: var(--transition-1, all .3s ease);
      min-width: 68px;
      text-decoration: none;
      color: var(--text, #111);
    }
    .day-tab:hover, .day-tab.active {
      border-color: var(--brand, #204f8c);
      background: var(--brand, #204f8c);
      color: #fff;
      box-shadow: var(--box-shadow-2, 0 8px 16px rgba(0,0,0,.1));
    }
    .day-tab .day-name {
      font-size: var(--font-size-minor, .76rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .day-tab .day-pct {
      font-size: var(--font-size-small, .87rem);
      font-weight: 700;
    }
    .day-tab .day-bar {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.3);
      overflow: hidden;
    }
    .day-tab .day-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .5s ease;
    }

    /* — Schedule grid (mobile: single column list) — */
    .schedule-container {
      padding: 0 1rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .day-title {
      font-size: var(--font-size-5, 1.32rem);
      font-weight: 700;
      margin: 1rem 0 .5rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .day-title .pct-badge {
      font-size: var(--font-size-small, .87rem);
      font-weight: 600;
      padding: .15rem .6rem;
      border-radius: 1rem;
      color: #fff;
    }

    .slot-list { list-style: none; }

    .slot-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .65rem .75rem;
      border-radius: .5rem;
      margin-bottom: .35rem;
      border-left: 4px solid transparent;
      background: var(--bg-card, rgba(255,255,255,.72));
      border: 1px solid var(--border, #e5e7eb);
      transition: var(--transition-1, all .3s ease);
      text-decoration: none;
      color: inherit;
    }
    .slot-item:hover {
      box-shadow: var(--box-shadow-1, 0 2px 8px rgba(0,0,0,.1));
      transform: translateY(-1px);
    }
    .slot-item.clickable { cursor: pointer; }
    .slot-item.clickable:hover {
      border-color: var(--brand, #204f8c);
    }

    .slot-time {
      font-size: var(--font-size-small, .87rem);
      font-weight: 600;
      min-width: 90px;
      white-space: nowrap;
    }

    .slot-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    .slot-bar {
      height: 8px;
      border-radius: 4px;
      background: var(--cinza-100, #d6d6d6);
      overflow: hidden;
    }
    .slot-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .6s ease;
    }
    .slot-detail {
      display: flex;
      justify-content: space-between;
      font-size: var(--font-size-minor, .76rem);
      color: var(--text-muted, #777);
    }

    .slot-pct {
      font-size: var(--font-size-base, 1rem);
      font-weight: 700;
      min-width: 44px;
      text-align: right;
    }

    .slot-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #25D366;
      color: #fff;
      flex-shrink: 0;
      transition: transform .2s ease;
    }
    .slot-whatsapp:hover { transform: scale(1.15); }
    .slot-whatsapp svg { width: 18px; height: 18px; }

    .slot-item.blocked {
      opacity: .5;
      border-color: var(--cinza-200, #bdbdbd);
    }
    .slot-item.blocked .slot-time { text-decoration: line-through; }
    .badge-blocked {
      font-size: var(--font-size-minor, .76rem);
      background: var(--cinza-200, #bdbdbd);
      color: var(--cinza-700, #444);
      padding: .1rem .5rem;
      border-radius: .75rem;
      font-weight: 600;
    }

    /* — Week indicators — */
    .week-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-wrap: wrap;
    }
    .week-dot {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      border-radius: 4px;
      font-size: .6rem;
      font-weight: 700;
      line-height: 1;
      border: 1px solid var(--border, #e5e7eb);
    }
    .week-dot.empty {
      background: var(--cinza-50, #f0f0f0);
      color: var(--cinza-300, #a3a3a3);
      border-style: dashed;
    }
    .week-dot.partial {
      background: #fef3c7;
      color: #92400e;
      border-color: #fbbf24;
    }
    .week-dot.full {
      background: #d1fae5;
      color: #065f46;
      border-color: #34d399;
    }
    .week-label {
      font-size: var(--font-size-minor, .76rem);
      color: var(--text-muted, #777);
      margin-right: 2px;
    }

    /* Mobile slot week detail */
    .slot-weeks {
      display: flex;
      gap: 3px;
      margin-top: 4px;
      align-items: center;
    }

    /* Desktop grid week dots */
    .grid-cell .cell-weeks {
      display: flex;
      gap: 2px;
      margin-top: 2px;
    }
    .grid-cell .cell-weeks .wd {
      width: 14px; height: 14px;
      border-radius: 3px;
      font-size: .5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .grid-cell .cell-weeks .wd.empty {
      background: rgba(0,0,0,.06);
      color: rgba(0,0,0,.25);
    }
    .grid-cell .cell-weeks .wd.partial {
      background: #fef3c7;
      color: #92400e;
    }
    .grid-cell .cell-weeks .wd.full {
      background: #d1fae5;
      color: #065f46;
    }

    /* — Color levels — */
    .fill-0   { background: #ef4444; }
    .fill-25  { background: #f97316; }
    .fill-50  { background: #eab308; }
    .fill-75  { background: #84cc16; }
    .fill-100 { background: #22c55e; }

    .text-0   { color: #ef4444; }
    .text-25  { color: #f97316; }
    .text-50  { color: #eab308; }
    .text-75  { color: #84cc16; }
    .text-100 { color: #22c55e; }

    .bg-0   { background: #ef4444; }
    .bg-25  { background: #f97316; }
    .bg-50  { background: #eab308; }
    .bg-75  { background: #84cc16; }
    .bg-100 { background: #22c55e; }

    /* — Legend — */
    .legend {
      display: flex;
      justify-content: center;
      gap: .75rem;
      padding: .75rem 1rem;
      flex-wrap: wrap;
      font-size: var(--font-size-minor, .76rem);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }

    /* — CTA — */
    .cta-section {
      text-align: center;
      padding: 2rem 1rem;
      background: var(--bg-card, rgba(255,255,255,.72));
      border-top: 1px solid var(--border, #e5e7eb);
    }
    .cta-section p {
      font-size: var(--font-size-6, 1.15rem);
      font-weight: 500;
      margin-bottom: .25rem;
    }
    .cta-section .cta-verse {
      font-size: var(--font-size-small, .87rem);
      color: var(--text-muted, #777);
      font-style: italic;
    }

    /* — Desktop: grid view — */
    @media (min-width: 768px) {
      .page-header h1 { font-size: var(--font-size-2, 2.01rem); }

      .day-selector {
        justify-content: center;
        overflow: visible;
      }

      .schedule-desktop {
        display: grid;
        grid-template-columns: 90px repeat(7, 1fr);
        gap: 2px;
        padding: 0 1rem 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .grid-header {
        background: var(--brand, #204f8c);
        color: #fff;
        font-weight: 700;
        font-size: var(--font-size-small, .87rem);
        text-align: center;
        padding: .5rem .25rem;
        border-radius: .25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: .15rem;
      }
      .grid-header .gh-pct {
        font-size: var(--font-size-minor, .76rem);
        opacity: .8;
      }

      .grid-time {
        background: var(--bg-card, rgba(255,255,255,.72));
        font-size: var(--font-size-minor, .76rem);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: .25rem;
        border-radius: .25rem;
        border: 1px solid var(--border, #e5e7eb);
      }

      .grid-cell {
        border-radius: .25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: .35rem .25rem;
        font-size: var(--font-size-minor, .76rem);
        font-weight: 600;
        cursor: default;
        border: 1px solid var(--border, #e5e7eb);
        transition: var(--transition-1, all .3s ease);
        text-decoration: none;
        color: inherit;
        gap: .1rem;
      }
      .grid-cell:hover {
        box-shadow: var(--box-shadow-1, 0 2px 8px rgba(0,0,0,.1));
        transform: scale(1.05);
        z-index: 2;
      }
      .grid-cell.clickable { cursor: pointer; }
      .grid-cell .cell-people {
        font-size: var(--font-size-minor, .76rem);
        opacity: .8;
      }
      .grid-cell .cell-pct {
        font-size: var(--font-size-small, .87rem);
        font-weight: 700;
      }
      .grid-cell.cell-blocked {
        background: var(--cinza-100, #d6d6d6) !important;
        opacity: .5;
        color: var(--cinza-500, #777);
      }

      .grid-cell.lv-0   { background: #fef2f2; color: #991b1b; }
      .grid-cell.lv-25  { background: #fff7ed; color: #9a3412; }
      .grid-cell.lv-50  { background: #fefce8; color: #854d0e; }
      .grid-cell.lv-75  { background: #f7fee7; color: #3f6212; }
      .grid-cell.lv-100 { background: #f0fdf4; color: #166534; }

      .schedule-mobile { display: none; }
    }

    @media (max-width: 767px) {
      .schedule-desktop { display: none; }
      .schedule-mobile { display: block; }
    }

    /* — Error — */
    .error-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--accent, #8f2d2d);
    }
    .error-msg h2 { margin-bottom: .5rem; }
    .error-msg p { color: var(--text-muted, #777); }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="page-header">
    <h1>Adoração Perpétua</h1>
    <p>Veja os horários que precisam de adoradores e comprometa-se com Jesus Eucarístico</p>
  </header>

  <!-- Main Content (populated by JS) -->
  <main id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Carregando escala de adoração...</span>
    </div>
  </main>

  <!-- CTA -->
  <footer class="cta-section" id="cta" style="display:none;">
    <p>Jesus conta com você na Adoração!</p>
    <span class="cta-verse">"Então não pudestes vigiar uma hora comigo?" — Mt 26,40</span>
  </footer>

  <script>
    /* ========================================
       CONFIGURAÇÕES — edite aqui
       ======================================== */

    // Meta de adoradores por horário (1 = mínimo, 2 = ideal com backup)
    const META_ADORADORES = 2;

    // WhatsApp da responsável (com código do país, sem +)
    const WHATSAPP_NUMERO = '5561982644432';

    // Mensagem pré-preenchida (use {dia} e {horario} como variáveis)
    const WHATSAPP_MSG = 'Olá! Gostaria de me comprometer com a Adoração Perpétua no horário de {horario} na {dia}. Como faço para me inscrever?';

    // URL do Google Sheets publicado como CSV (aba "adoracao")
    // Para publicar: Google Sheets > Arquivo > Compartilhar > Publicar na web > aba "adoracao" > CSV
    const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-pbvSfuIvxl3WarKBKMsOBHOO3zmpup7EBInURPaDNRjIhkLSGduNTJxdDyISbRFq3xawLaa5uJC0/pub?gid=465250531&single=true&output=csv';

    /* ========================================
       CÓDIGO — não edite abaixo (a menos que saiba o que faz)
       ======================================== */

    const DAYS_ORDER = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO'];
    const DAYS_SHORT = ['SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB', 'DOM'];

    // WhatsApp icon SVG
    const WHATSAPP_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
      return lines.slice(1).map(line => {
        // Handle quoted CSV properly
        const values = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') {
            inQuotes = !inQuotes;
          } else if (line[i] === ',' && !inQuotes) {
            values.push(current.trim());
            current = '';
          } else {
            current += line[i];
          }
        }
        values.push(current.trim());

        const obj = {};
        headers.forEach((h, i) => { obj[h] = values[i] || ''; });
        return obj;
      });
    }

    function calcSlotPct(slot) {
      const weeks = [
        parseInt(slot.sem1) || 0,
        parseInt(slot.sem2) || 0,
        parseInt(slot.sem3) || 0,
        parseInt(slot.sem4) || 0,
        parseInt(slot.sem5) || 0
      ];
      const total = weeks.reduce((sum, w) => sum + Math.min(w, META_ADORADORES), 0);
      return Math.round((total / (META_ADORADORES * 5)) * 100);
    }

    function calcSlotAvgPeople(slot) {
      const weeks = [
        parseInt(slot.sem1) || 0,
        parseInt(slot.sem2) || 0,
        parseInt(slot.sem3) || 0,
        parseInt(slot.sem4) || 0,
        parseInt(slot.sem5) || 0
      ];
      const filled = weeks.filter(w => w > 0);
      if (filled.length === 0) return 0;
      return Math.round((filled.reduce((a, b) => a + b, 0) / 5) * 10) / 10;
    }

    function calcSlotTotalPeople(slot) {
      return [
        parseInt(slot.sem1) || 0,
        parseInt(slot.sem2) || 0,
        parseInt(slot.sem3) || 0,
        parseInt(slot.sem4) || 0,
        parseInt(slot.sem5) || 0
      ].reduce((a, b) => a + b, 0);
    }

    function weeksWithPeople(slot) {
      return [
        parseInt(slot.sem1) || 0,
        parseInt(slot.sem2) || 0,
        parseInt(slot.sem3) || 0,
        parseInt(slot.sem4) || 0,
        parseInt(slot.sem5) || 0
      ].filter(w => w > 0).length;
    }

    function fillClass(pct) {
      if (pct === 0) return 'fill-0';
      if (pct <= 25) return 'fill-25';
      if (pct <= 50) return 'fill-50';
      if (pct <= 75) return 'fill-75';
      return 'fill-100';
    }

    function textClass(pct) {
      if (pct === 0) return 'text-0';
      if (pct <= 25) return 'text-25';
      if (pct <= 50) return 'text-50';
      if (pct <= 75) return 'text-75';
      return 'text-100';
    }

    function lvClass(pct) {
      if (pct === 0) return 'lv-0';
      if (pct <= 25) return 'lv-25';
      if (pct <= 50) return 'lv-50';
      if (pct <= 75) return 'lv-75';
      return 'lv-100';
    }

    function whatsappURL(dia, horario) {
      const msg = WHATSAPP_MSG
        .replace('{dia}', dia)
        .replace('{horario}', horario);
      return `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(msg)}`;
    }

    function formatHour(h) {
      return h.replace(':00', 'h');
    }

    function getWeeks(slot) {
      return [
        parseInt(slot.sem1) || 0,
        parseInt(slot.sem2) || 0,
        parseInt(slot.sem3) || 0,
        parseInt(slot.sem4) || 0,
        parseInt(slot.sem5) || 0
      ];
    }

    function weekDotsHTML(slot, size) {
      const weeks = getWeeks(slot);
      const labels = ['1ª', '2ª', '3ª', '4ª', '5ª'];
      const isSmall = size === 'small';
      const dotClass = isSmall ? 'wd' : 'week-dot';

      return weeks.map((count, i) => {
        let cls = 'empty';
        if (count >= META_ADORADORES) cls = 'full';
        else if (count > 0) cls = 'partial';
        return `<span class="${dotClass} ${cls}" title="${labels[i]} semana: ${count} pessoa(s)">${count}</span>`;
      }).join('');
    }

    function render(data) {
      // Group by day
      const byDay = {};
      DAYS_ORDER.forEach(d => { byDay[d] = []; });
      data.forEach(row => {
        const dia = (row.dia || '').toUpperCase().trim();
        if (byDay[dia]) byDay[dia].push(row);
      });

      // Calc day stats
      const dayStats = {};
      let totalSlots = 0;
      let totalFilled = 0;
      DAYS_ORDER.forEach(d => {
        const normalSlots = byDay[d].filter(s => (s.tipo || 'normal') === 'normal');
        const pcts = normalSlots.map(s => calcSlotPct(s));
        const avg = pcts.length ? Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length) : 0;
        dayStats[d] = { pct: avg, normalCount: normalSlots.length, totalSlots: byDay[d].length };
        totalSlots += normalSlots.length * 5; // 5 weeks
        normalSlots.forEach(s => {
          totalFilled += [
            parseInt(s.sem1) || 0,
            parseInt(s.sem2) || 0,
            parseInt(s.sem3) || 0,
            parseInt(s.sem4) || 0,
            parseInt(s.sem5) || 0
          ].reduce((a, b) => a + Math.min(b, META_ADORADORES), 0);
        });
      });
      const overallPct = totalSlots > 0 ? Math.round((totalFilled / (totalSlots * META_ADORADORES)) * 100) : 0;

      // Count slots needing help
      let slotsNeedHelp = 0;
      DAYS_ORDER.forEach(d => {
        byDay[d].forEach(s => {
          if ((s.tipo || 'normal') === 'normal' && calcSlotPct(s) < 100) slotsNeedHelp++;
        });
      });

      // Unique time slots
      const times = [...new Set(data.map(r => r.hora_inicio))];

      // Build HTML
      const app = document.getElementById('app');
      let html = '';

      // Stats bar
      html += `
        <div class="stats-bar">
          <div class="stat-card">
            <div class="stat-value ${textClass(overallPct)}">${overallPct}%</div>
            <div class="stat-label">Preenchimento geral</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:${slotsNeedHelp > 0 ? '#ef4444' : '#22c55e'}">${slotsNeedHelp}</div>
            <div class="stat-label">Horários precisam de você</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${META_ADORADORES}</div>
            <div class="stat-label text-balance">Meta de pessoas por horário</div>
          </div>
        </div>`;

      // Legend
      html += `
        <div class="legend">
          <div class="legend-item"><div class="legend-dot bg-0"></div> Vazio</div>
          <div class="legend-item"><div class="legend-dot bg-25"></div> Crítico</div>
          <div class="legend-item"><div class="legend-dot bg-50"></div> Parcial</div>
          <div class="legend-item"><div class="legend-dot bg-75"></div> Quase lá</div>
          <div class="legend-item"><div class="legend-dot bg-100"></div> Completo</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--cinza-200,#bdbdbd)"></div> Missa/Recolhe</div>
        </div>`;

      // Day selector tabs
      html += '<nav class="day-selector" id="daySelector">';
      DAYS_ORDER.forEach((d, i) => {
        const pct = dayStats[d].pct;
        html += `
          <a class="day-tab ${i === 0 ? 'active' : ''}" data-day="${d}" href="#day-${d}">
            <span class="day-name">${DAYS_SHORT[i]}</span>
            <span class="day-pct ${textClass(pct)}">${pct}%</span>
            <div class="day-bar">
              <div class="day-bar-fill ${fillClass(pct)}" style="width:${pct}%"></div>
            </div>
          </a>`;
      });
      html += '</nav>';

      // === DESKTOP GRID ===
      html += '<div class="schedule-desktop" id="desktopGrid">';
      // Header row
      html += '<div class="grid-header" style="background:transparent;color:var(--text,#111);font-size:var(--font-size-minor,.76rem);">Horário</div>';
      DAYS_ORDER.forEach((d, i) => {
        const pct = dayStats[d].pct;
        html += `<div class="grid-header">${DAYS_SHORT[i]}<span class="gh-pct">${pct}%</span></div>`;
      });

      // Data rows
      times.forEach(time => {
        const timeEnd = data.find(r => r.hora_inicio === time)?.hora_fim || '';
        html += `<div class="grid-time">${formatHour(time)}-${formatHour(timeEnd)}</div>`;

        DAYS_ORDER.forEach(d => {
          const slot = byDay[d].find(s => s.hora_inicio === time);
          if (!slot) {
            html += '<div class="grid-cell" style="background:var(--bg,#f0f0f0);"></div>';
            return;
          }

          const tipo = (slot.tipo || 'normal').toLowerCase();
          if (tipo === 'missa' || tipo === 'recolhe') {
            const label = tipo === 'missa' ? 'Missa' : 'Recolhe Jesus';
            html += `<div class="grid-cell cell-blocked" title="${label}">${label}</div>`;
            return;
          }

          const pct = calcSlotPct(slot);
          const avg = calcSlotAvgPeople(slot);
          const wk = weeksWithPeople(slot);
          const isClickable = pct < 100;
          const timeLabel = `${formatHour(slot.hora_inicio)} às ${formatHour(slot.hora_fim)}`;
          const url = isClickable ? whatsappURL(d, timeLabel) : '#';

          html += `<${isClickable ? 'a' : 'div'} class="grid-cell ${lvClass(pct)} ${isClickable ? 'clickable' : ''}" ${isClickable ? `href="${url}" target="_blank" rel="noopener"` : ''} title="${d} ${timeLabel}: ${pct}%">
            <span class="cell-pct">${pct}%</span>
            <div class="cell-weeks">${weekDotsHTML(slot, 'small')}</div>
          </${isClickable ? 'a' : 'div'}>`;
        });
      });
      html += '</div>';

      // === MOBILE LIST ===
      html += '<div class="schedule-mobile">';
      DAYS_ORDER.forEach((d, i) => {
        const pct = dayStats[d].pct;
        html += `
          <div class="schedule-container day-panel" id="day-${d}" data-day="${d}" style="${i > 0 ? 'display:none;' : ''}">
            <div class="day-title">
              ${d.charAt(0) + d.slice(1).toLowerCase()}
              <span class="pct-badge ${fillClass(pct)}">${pct}%</span>
            </div>
            <ul class="slot-list">`;

        byDay[d].forEach(slot => {
          const tipo = (slot.tipo || 'normal').toLowerCase();
          const timeLabel = `${formatHour(slot.hora_inicio)} às ${formatHour(slot.hora_fim)}`;

          if (tipo === 'missa' || tipo === 'recolhe') {
            const label = tipo === 'missa' ? 'Missa' : 'Recolhe Jesus';
            html += `
              <li class="slot-item blocked">
                <span class="slot-time">${timeLabel}</span>
                <span class="badge-blocked">${label}</span>
              </li>`;
            return;
          }

          const pctSlot = calcSlotPct(slot);
          const avg = calcSlotAvgPeople(slot);
          const wk = weeksWithPeople(slot);
          const isClickable = pctSlot < 100;
          const url = whatsappURL(d, timeLabel);

          html += `
            <li class="slot-item ${isClickable ? 'clickable' : ''}" ${isClickable ? `onclick="window.open('${url}','_blank')"` : ''}>
              <span class="slot-time">${timeLabel}</span>
              <div class="slot-bar-wrap">
                <div class="slot-bar">
                  <div class="slot-bar-fill ${fillClass(pctSlot)}" style="width:${pctSlot}%"></div>
                </div>
                <div class="slot-weeks">
                  <span class="week-label">Sem:</span>
                  ${weekDotsHTML(slot, 'normal')}
                </div>
              </div>
              <span class="slot-pct ${textClass(pctSlot)}">${pctSlot}%</span>
              ${isClickable ? `<span class="slot-whatsapp">${WHATSAPP_SVG}</span>` : ''}
            </li>`;
        });

        html += '</ul></div>';
      });
      html += '</div>';

      app.innerHTML = html;
      document.getElementById('cta').style.display = 'block';

      // Tab interaction (mobile)
      document.querySelectorAll('.day-tab').forEach(tab => {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          const day = this.dataset.day;
          document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          document.querySelectorAll('.day-panel').forEach(p => {
            p.style.display = p.dataset.day === day ? 'block' : 'none';
          });
        });
      });
    }

    // Fetch and render
    fetch(SHEETS_CSV_URL)
      .then(r => {
        if (!r.ok) throw new Error('Erro ao carregar dados');
        return r.text();
      })
      .then(text => {
        const data = parseCSV(text);
        if (!data.length) throw new Error('Planilha vazia');
        render(data);
      })
      .catch(err => {
        console.error(err);
        document.getElementById('app').innerHTML = `
          <div class="error-msg">
            <h2>Não foi possível carregar os dados</h2>
            <p>Verifique se a planilha está publicada na web.<br>
            Erro: ${err.message}</p>
          </div>`;
      });
  </script>
</body>

</html>
